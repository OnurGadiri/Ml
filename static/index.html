<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iris Species Classifier</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <p class="tag">ml project</p>
      <h1>Iris Species Classifier</h1>
      <p class="sub">enter flower measurements and get a species prediction from the trained model</p>
    </header>

    <main class="grid">
      <section class="card">
        <h2>measurements</h2>
        <form id="form">
          <label>
            <span>sepal length (cm)</span>
            <input type="number" step="0.1" name="sepal_length" value="5.1" required>
          </label>
          <label>
            <span>sepal width (cm)</span>
            <input type="number" step="0.1" name="sepal_width" value="3.5" required>
          </label>
          <label>
            <span>petal length (cm)</span>
            <input type="number" step="0.1" name="petal_length" value="1.4" required>
          </label>
          <label>
            <span>petal width (cm)</span>
            <input type="number" step="0.1" name="petal_width" value="0.2" required>
          </label>
          <button type="submit">predict</button>
        </form>
        <p id="err" class="err"></p>
      </section>

      <section class="card">
        <h2>result</h2>
        <div id="out" class="out empty">submit values to see prediction</div>
        <div id="bars" class="bars"></div>
      </section>

      <section class="card wide">
        <h2>model info</h2>
        <div id="info" class="info">loading...</div>
      </section>

      <section class="card wide">
        <h2>confusion matrix</h2>
        <img id="chart" src="/chart" alt="confusion matrix" class="chart">
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
